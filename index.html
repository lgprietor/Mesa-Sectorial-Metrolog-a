
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }

            body, html {
                height: 100vh;
                width: 100vw;
                font-family: 'Segoe UI', sans-serif;
                overflow: hidden;
                background: white;
            }

            .wrapper {
                display: flex;
                height: 100vh;
                width: 100vw;
            }

            #main-viz {
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .header {
                display: flex;
                align-items: center;
                padding: 10px 30px;
                border-bottom: 4px solid #39A900;
                background: #fff;
                height: 70px;
                flex-shrink: 0;
            }
            .logo { height: 50px; margin-right: 20px; }
            .header-text h1 { font-size: 1.2em; color: #2c3e50; margin: 0; }
            .header-text p { font-size: 0.75em; color: #7f8c8d; margin-top: 2px; }

            #chart-container {
                flex: 1;
                min-height: 0;
                min-width: 0;
                display: flex;
                align-items: stretch;
                justify-content: stretch;
                padding: 8px;
                background: #fff;
            }

            #chart-area {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: stretch;
            }

            #chart-area > div,
            .plotly-graph-div {
                width: 100% !important;
                height: 100% !important;
                min-height: 0 !important;
            }

            /* PANEL DERECHO */
            #panel {
                width: 360px;
                flex-shrink: 0;
                background: #fdfdfd;
                border-left: 1px solid #eee;
                padding: 25px;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
            }

            h2 { color: #2c3e50; border-bottom: 2px solid #39A900; padding-bottom: 10px; margin-bottom: 18px; font-size: 1.4em; }
            .label-title { font-size: 0.72em; color: #aaa; text-transform: uppercase; font-weight: bold; letter-spacing: 0.05em; margin-bottom: 8px; }

            #display-label {
                background: #fff;
                padding: 20px;
                border-radius: 8px;
                border: 1px solid #f0f0f0;
                min-height: 150px;
                display: block;
                font-size: 1.1em;
                line-height: 1.5;
                color: #2c3e50;
                box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            }
            #display-path { margin-top: 20px; font-size: 0.82em; color: #95a5a6; border-top: 1px solid #eee; padding-top: 14px; line-height: 1.7; }

            /* EXPLORADOR */
            #search-input {
                width: 100%;
                padding: 10px 36px 10px 12px;
                border: 1px solid #e0e0e0;
                border-radius: 8px;
                font-size: 0.9em;
                color: #2c3e50;
                background: #fff;
                outline: none;
                transition: border-color 0.2s, box-shadow 0.2s;
                font-family: 'Segoe UI', sans-serif;
            }
            #search-input:focus { border-color: #39A900; box-shadow: 0 0 0 3px rgba(57,169,0,0.08); }
            #search-results { display: none; margin-top: 8px; max-height: 180px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
            .search-item { padding: 9px 12px; cursor: pointer; font-size: 0.85em; color: #2c3e50; border-bottom: 1px solid #f5f5f5; line-height: 1.4; }
            .search-item:last-child { border-bottom: none; }
            .search-item:hover { background: #f0fae8; }
            mark { background: #d4f0b8; color: #2c3e50; border-radius: 2px; padding: 0 2px; font-style: normal; }
            #search-status { font-size: 0.78em; color: #aaa; margin-top: 5px; min-height: 16px; }

            /* BOTÓN REINICIAR */
            #btn-reset {
                display: none;
                width: 100%;
                margin-bottom: 16px;
                padding: 9px 0;
                background: #fff;
                color: #39A900;
                border: 1.5px solid #39A900;
                border-radius: 8px;
                font-size: 0.88em;
                font-family: 'Segoe UI', sans-serif;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.18s, color 0.18s;
                letter-spacing: 0.01em;
            }
            #btn-reset:hover {
                background: #39A900;
                color: #fff;
            }
        </style>
    </head>

            <div id="panel">
                <h2>Detalle</h2>

                <!-- BOTÓN REINICIAR (aparece solo cuando se navega a un nodo) -->
                <button id="btn-reset" onclick="resetVista()">↩ Volver al inicio</button>

                <!-- EXPLORADOR -->
                <div class="label-title">Explorador</div>
                <div style="position: relative; margin-bottom: 20px;">
                    <input type="text" id="search-input" placeholder="Buscar en el mapa..." oninput="handleSearch(this.value)">
                    <span style="position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:0.85em; color:#aaa; pointer-events:none;">🔍</span>
                    <div id="search-results"></div>
                    <div id="search-status"></div>
                </div>

                <!-- DESCRIPCIÓN Y RUTA -->
                <div class="label-title">Descripción</div>
                <div id="display-label">Pasa el mouse sobre el mapa...</div>
                <div id="display-path"></div>
            </div>
        </div>

        <script>
            function resizePlot() {
                var area = document.getElementById('chart-area');
                var plots = document.getElementsByClassName('plotly-graph-div');
                if (plots.length && area) {
                    Plotly.relayout(plots[0], {
                        width:  area.offsetWidth,
                        height: area.offsetHeight
                    });
                }
            }

            function getCustomData(plotEl) {
                var raw = plotEl.data[0].customdata;
                return raw.map(function(item) {
                    return Array.isArray(item) ? item[0] : item;
                });
            }

            // Muestra u oculta el botón de reinicio
            function setResetVisible(visible) {
                document.getElementById('btn-reset').style.display = visible ? 'block' : 'none';
            }

            // Vuelve el Sunburst a la raíz (level = "")
            function resetVista() {
                var plots = document.getElementsByClassName('plotly-graph-div');
                if (!plots.length) return;
                Plotly.restyle(plots[0], { level: '' }, [0]);
                document.getElementById('display-label').innerText = 'Pasa el mouse sobre el mapa...';
                document.getElementById('display-path').innerHTML = '';
                document.getElementById('search-status').textContent = '';
                setResetVisible(false);
            }

            function handleSearch(query) {
                var resultsBox = document.getElementById('search-results');
                var statusEl   = document.getElementById('search-status');
                var plots      = document.getElementsByClassName('plotly-graph-div');

                query = query.trim();

                if (!query) {
                    resultsBox.style.display = 'none';
                    statusEl.textContent = '';
                    return;
                }

                if (!plots.length) return;

                var ids        = plots[0].data[0].ids;
                var customs    = getCustomData(plots[0]);
                var queryLower = query.toLowerCase();
                var matches    = [];

                for (var i = 0; i < customs.length; i++) {
                    if (customs[i] && String(customs[i]).toLowerCase().includes(queryLower)) {
                        matches.push({ id: ids[i], label: String(customs[i]) });
                    }
                }

                statusEl.textContent = matches.length
                    ? matches.length + ' resultado(s)'
                    : 'Sin resultados';

                if (!matches.length) {
                    resultsBox.style.display = 'none';
                    return;
                }

                var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                var regex   = new RegExp('(' + escaped + ')', 'gi');

                resultsBox.innerHTML = matches.map(function(m) {
                    var highlighted = m.label.replace(regex, '<mark>$1</mark>');
                    return '<div class="search-item" data-id="' + m.id + '" data-label="' + m.label.replace(/"/g, '&quot;') + '" onclick="navigateTo(this)">' + highlighted + '</div>';
                }).join('');

                resultsBox.style.display = 'block';
            }

            function navigateTo(el) {
                var targetId = el.getAttribute('data-id');
                var label    = el.getAttribute('data-label');
                var plots    = document.getElementsByClassName('plotly-graph-div');
                if (!plots.length) return;

                document.getElementById('display-label').innerText = label;
                document.getElementById('display-path').innerHTML =
                    '<b>Ruta:</b><br>' +
                    targetId.split('/').join(' <span style="color:#39A900">→</span> ');

                Plotly.restyle(plots[0], { level: targetId }, [0]);

                document.getElementById('search-results').style.display = 'none';
                document.getElementById('search-status').textContent = '✓ Navegando a nodo';
                document.getElementById('search-input').value = '';

                // Muestra botón de reinicio
                setResetVisible(true);
            }

            var checkExist = setInterval(function() {
                var plots = document.getElementsByClassName('plotly-graph-div');
                if (plots.length) {
                    var myPlot = plots[0];
                    resizePlot();

                    myPlot.on('plotly_hover', function(data) {
                        document.getElementById('display-label').innerText = data.points[0].customdata;
                    });

                    myPlot.on('plotly_sunburstclick', function(data) {
                        var pt = data.points[0];
                        if (pt.id) {
                            document.getElementById('display-path').innerHTML =
                                "<b>Ruta:</b><br>" +
                                pt.id.split('/').join(' <span style="color:#39A900">→</span> ');
                            // Muestra botón si se navega manualmente también
                            setResetVisible(true);
                        }
                    });

                    // Cuando el usuario hace clic en el centro del Sunburst para subir,
                    // detecta si regresó a la raíz y oculta el botón
                    myPlot.on('plotly_sunburstclick', function(data) {
                        var pt = data.points[0];
                        if (!pt.id || pt.id === 'Total') {
                            setResetVisible(false);
                        }
                    });

                    clearInterval(checkExist);
                }
            }, 200);

            window.addEventListener('resize', resizePlot);
        </script>
    </body>
