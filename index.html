
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }

            body, html {
                height: 100vh;
                width: 100vw;
                font-family: 'Segoe UI', sans-serif;
                overflow: hidden;
                background: white;
            }

            .wrapper {
                display: flex;
                height: 100vh;
                width: 100vw;
            }

            /* ✅ min-width: 0 evita que flexbox desborde */
            #main-viz {
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .header {
                display: flex;
                align-items: center;
                padding: 10px 30px;
                border-bottom: 4px solid #39A900;
                background: #fff;
                height: 70px;
                flex-shrink: 0;
            }
            .logo { height: 50px; margin-right: 20px; }
            .header-text h1 { font-size: 1.2em; color: #2c3e50; margin: 0; }
            .header-text p { font-size: 0.75em; color: #7f8c8d; margin-top: 2px; }

            /* ✅ min-height: 0 es LA clave para que flex-grow funcione en columna */
            #chart-container {
                flex: 1;
                min-height: 0;
                min-width: 0;
                display: flex;
                align-items: stretch;
                justify-content: stretch;
                padding: 8px;
                background: #fff;
            }

            /* ✅ Ocupa TODO el espacio del contenedor */
            #chart-area {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: stretch;
            }

            /* ✅ Fuerza al div interno de Plotly a ser 100% */
            #chart-area > div,
            .plotly-graph-div {
                width: 100% !important;
                height: 100% !important;
                min-height: 0 !important;
            }

            /* PANEL DERECHO */
            #panel {
                width: 360px;
                flex-shrink: 0;
                background: #fdfdfd;
                border-left: 1px solid #eee;
                padding: 25px;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
            }

            h2 { color: #2c3e50; border-bottom: 2px solid #39A900; padding-bottom: 10px; margin-bottom: 18px; font-size: 1.4em; }
            .label-title { font-size: 0.72em; color: #aaa; text-transform: uppercase; font-weight: bold; letter-spacing: 0.05em; margin-bottom: 8px; }

            #display-label {
                background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #f0f0f0;
                min-height: 150px; display: flex; align-items: center; font-size: 1.1em;
                line-height: 1.5; color: #2c3e50; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            }
            #display-path { margin-top: 20px; font-size: 0.82em; color: #95a5a6; border-top: 1px solid #eee; padding-top: 14px; line-height: 1.7; }
        </style>
    </head>

        <script>
            function resizePlot() {
                var area = document.getElementById('chart-area');
                var plots = document.getElementsByClassName('plotly-graph-div');
                if (plots.length && area) {
                    // ✅ Le dice a Plotly exactamente cuántos px tiene disponibles
                    Plotly.relayout(plots[0], {
                        width:  area.offsetWidth,
                        height: area.offsetHeight
                    });
                }
            }

            var checkExist = setInterval(function() {
                var plots = document.getElementsByClassName('plotly-graph-div');
                if (plots.length) {
                    var myPlot = plots[0];

                    // ✅ Fuerza el tamaño real del contenedor
                    resizePlot();

                    // Eventos interactivos (sin cambios)
                    myPlot.on('plotly_hover', function(data) {
                        document.getElementById('display-label').innerText = data.points[0].customdata;
                    });
                    myPlot.on('plotly_sunburstclick', function(data) {
                        var pt = data.points[0];
                        if (pt.id) {
                            document.getElementById('display-path').innerHTML =
                                "<b>Ruta:</b><br>" +
                                pt.id.split('/').join(' <span style="color:#39A900">→</span> ');
                        }
                    });

                    clearInterval(checkExist);
                }
            }, 200);

            // ✅ Re-ajusta si cambia el tamaño de ventana
            window.addEventListener('resize', resizePlot);
        </script>
